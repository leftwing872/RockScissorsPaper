version: 0.2

# -----------------------------------------------------------------------------
# CodeBuild: build the Docker image and push it to Amazon ECR.
#
# Requirements on the CodeBuild project:
#   * "Privileged" mode must be ENABLED (needed to run the Docker daemon).
#   * The service role needs ECR permissions:
#       ecr:GetAuthorizationToken (on *),
#       ecr:BatchCheckLayerAvailability, ecr:CompleteLayerUpload,
#       ecr:InitiateLayerUpload, ecr:PutImage, ecr:UploadLayerPart,
#       ecr:DescribeRepositories, ecr:CreateRepository (on the repo).
#
# Override these via the CodeBuild project's Environment variables if needed.
# -----------------------------------------------------------------------------
env:
  variables:
    AWS_DEFAULT_REGION: "ap-northeast-2"
    IMAGE_REPO_NAME: "take1server"
    CONTAINER_NAME: "take1server"

phases:
  pre_build:
    commands:
      - echo "Resolving account / repository..."
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REPOSITORY_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${IMAGE_REPO_NAME}"
      - 'echo "Repository: ${REPOSITORY_URI}"'
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "${AWS_DEFAULT_REGION}" | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - echo "Ensuring ECR repository exists..."
      - aws ecr describe-repositories --repository-names "${IMAGE_REPO_NAME}" --region "${AWS_DEFAULT_REGION}" >/dev/null 2>&1 || aws ecr create-repository --repository-name "${IMAGE_REPO_NAME}" --region "${AWS_DEFAULT_REGION}"
      - COMMIT_HASH=$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}" | cut -c1-7)
      - IMAGE_TAG="${COMMIT_HASH:-latest}"
      - 'echo "Image tag: ${IMAGE_TAG}"'
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "${REPOSITORY_URI}:latest" -t "${REPOSITORY_URI}:${IMAGE_TAG}" .
  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push "${REPOSITORY_URI}:latest"
      - docker push "${REPOSITORY_URI}:${IMAGE_TAG}"
      - echo "Writing imagedefinitions.json (for ECS/CodePipeline consumers)..."
      - printf '[{"name":"%s","imageUri":"%s"}]' "${CONTAINER_NAME}" "${REPOSITORY_URI}:${IMAGE_TAG}" > imagedefinitions.json
      - echo "Done. Pushed ${REPOSITORY_URI}:${IMAGE_TAG}"

artifacts:
  files:
    - imagedefinitions.json
